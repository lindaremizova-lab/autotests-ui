<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic HTML Example</title>
</head>
<body>

    <header>
        <h1>My HTML Page</h1>
        <p>This is a basic example of an HTML page.</p>
    </header>

    <main>
        <section>
            <h2>Text Section</h2>
            <div>
                <p>Text</p>
                <span style="color: red;">Red text</span>
            </div>
        </section>

        <section>
            <h2>Link and Image</h2>
            <a href="https://www.google.com/?client=safari&channel=mac_bm" target="_blank">
                Open Google
            </a>
            <br><br>
            <img src="https://via.placeholder.com/150" alt="Example image">
        </section>

        <section>
            <h2>Unordered List</h2>
            <ul>
                <li>Item 1</li>
                <li>Item 2</li>
            </ul>
        </section>

        <section>
            <h2>Form Elements</h2>

            <input type="text" placeholder="Text">
            <br><br>

            <textarea placeholder="Write something here"></textarea>
            <br><br>

            <form action="/submit" method="POST">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username">
                <button type="submit">Отправить</button>
            </form>

            <br>

            <input type="text" placeholder="Введите ваше имя">
        </section>

        <section>
            <h2>Table</h2>
            <table border="1">
                <tr>
                    <td>Ячейка 1</td>
                    <td>Ячейка 2</td>
                </tr>
            </table>
        </section>
    </main>

    <footer>
        <p>Footer of the page</p>
    </footer>

</body>
</html>
